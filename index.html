<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>暴走男朋友</title>
    <meta
      name="description"
      content="手机优先的搞怪互动小游戏。点击男朋友，切换暴揍和抚摸模式，赚爱心值解锁整蛊道具和武器。"
    >
    <link rel="stylesheet" href="./css/style.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="top-bar">
        <div class="brand-copy">
          <p class="eyebrow">Love Trouble Simulator</p>
          <h1>暴走男朋友</h1>
        </div>
        <button id="drawerToggle" class="icon-button" type="button" aria-expanded="true" aria-controls="bottomDrawer">
          收起面板
        </button>
      </header>

      <main class="stage-page">
        <section class="stage-wrap">
          <div class="mode-strip">
            <div class="mode-switch" role="tablist" aria-label="互动模式">
              <button id="rageModeButton" class="mode-button is-active" type="button" data-mode="rage">暴揍模式</button>
              <button id="careModeButton" class="mode-button" type="button" data-mode="care">抚摸模式</button>
            </div>
            <div class="resource-row">
              <span class="resource-pill">爱心值 <strong id="heartBalance">0</strong></span>
              <span class="resource-pill">已解锁 <strong id="unlockCount">1 / 8</strong></span>
            </div>
          </div>

          <section id="stage" class="character-stage mood-idle">
            <div class="stage-decor stage-decor-left"></div>
            <div class="stage-decor stage-decor-right"></div>

            <div class="speech-layer">
              <div id="speechBubble" class="speech-bubble">先别急着制裁，点点我试试今天是什么模式。</div>
            </div>

            <div class="character-meta">
              <div class="meta-card">
                <span>当前对象</span>
                <strong id="boyfriendName">今日挨揍担当</strong>
              </div>
              <div class="meta-card">
                <span>当前装备</span>
                <strong id="equippedItemLabel">小拳拳</strong>
              </div>
            </div>

            <button id="characterButton" class="character-button" type="button" aria-label="点击男朋友角色触发互动">
              <div class="character-glow"></div>
              <div id="avatarRoot" class="avatar-root">
                <div class="body-shadow"></div>
                <div class="avatar-body">
                  <div class="hair hair-left"></div>
                  <div class="hair hair-right"></div>
                  <div class="face">
                    <div class="blush blush-left"></div>
                    <div class="blush blush-right"></div>
                    <div class="brow brow-left"></div>
                    <div class="brow brow-right"></div>
                    <div class="eye eye-left"></div>
                    <div class="eye eye-right"></div>
                    <div class="mouth"></div>
                  </div>
                  <div class="arm arm-left"></div>
                  <div class="arm arm-right"></div>
                  <div class="torso"></div>
                </div>
                <img id="photoOverlay" class="photo-overlay hidden" alt="自定义男朋友头像">
              </div>
              <span class="tap-hint">点我互动</span>
            </button>

            <div class="stage-stats">
              <article class="mini-stat">
                <span>当前状态</span>
                <strong id="statusLabel">待机观察中</strong>
              </article>
              <article class="mini-stat">
                <span>模式反馈</span>
                <strong id="modeDescription">点击人物会搞怪制裁并掉求生值。</strong>
              </article>
            </div>

            <div class="survival-panel">
              <div class="survival-text">
                <span>求生值</span>
                <strong id="survivalLabel">100%</strong>
              </div>
              <div class="meter-track">
                <div id="survivalMeter" class="meter-fill"></div>
              </div>
            </div>
          </section>
        </section>

        <section id="bottomDrawer" class="bottom-drawer is-open">
          <div class="drawer-handle"></div>

          <nav class="drawer-tabs" aria-label="底部操作面板">
            <button class="drawer-tab is-active" type="button" data-tab="interact">互动</button>
            <button class="drawer-tab" type="button" data-tab="shop">商店</button>
            <button class="drawer-tab" type="button" data-tab="record">记录</button>
            <button class="drawer-tab" type="button" data-tab="settings">设置</button>
          </nav>

          <div class="drawer-panels">
            <section id="panel-interact" class="drawer-panel is-active">
              <div class="panel-headline">
                <div>
                  <p class="mini-label">互动区</p>
                  <h2>已解锁整蛊与武器</h2>
                </div>
                <span id="activeModeTag" class="tag-chip">暴揍模式</span>
              </div>
              <div id="interactList" class="item-grid"></div>
            </section>

            <section id="panel-shop" class="drawer-panel">
              <div class="panel-headline">
                <div>
                  <p class="mini-label">商店</p>
                  <h2>爱心值兑换</h2>
                </div>
                <span class="tag-chip">抚摸赚积分</span>
              </div>
              <div id="shopList" class="shop-grid"></div>
            </section>

            <section id="panel-record" class="drawer-panel">
              <div class="panel-headline">
                <div>
                  <p class="mini-label">记录</p>
                  <h2>今日恋爱执法榜</h2>
                </div>
              </div>
              <div class="record-grid">
                <article class="record-card">
                  <span>总互动次数</span>
                  <strong id="totalCount">0</strong>
                </article>
                <article class="record-card">
                  <span>累计爱心值</span>
                  <strong id="heartEarned">0</strong>
                </article>
                <article class="record-card">
                  <span>暴揍点击</span>
                  <strong id="rageTapCount">0</strong>
                </article>
                <article class="record-card">
                  <span>抚摸点击</span>
                  <strong id="careTapCount">0</strong>
                </article>
                <article class="record-card">
                  <span>最常用装备</span>
                  <strong id="favoriteItem">小拳拳</strong>
                </article>
                <article class="record-card">
                  <span>下个彩蛋</span>
                  <strong id="nextUnlock">总互动 10 次</strong>
                </article>
              </div>
              <div id="milestoneList" class="milestone-list"></div>
            </section>

            <section id="panel-settings" class="drawer-panel">
              <div class="panel-headline">
                <div>
                  <p class="mini-label">设置</p>
                  <h2>自定义男朋友</h2>
                </div>
              </div>
              <label class="field">
                <span>男朋友称呼</span>
                <input id="nameInput" type="text" maxlength="16" placeholder="比如：宝宝、小王、狗男人">
              </label>
              <label class="upload-card" for="photoInput">
                <span>上传照片贴脸</span>
                <small>照片只保存在当前浏览器，不会上传到服务器。</small>
              </label>
              <input id="photoInput" type="file" accept="image/*" hidden>
              <div class="settings-actions">
                <button id="removePhotoButton" class="ghost-button" type="button">移除照片</button>
                <button id="resetButton" class="danger-button" type="button">重置全部进度</button>
              </div>
            </section>
          </div>
        </section>
      </main>
    </div>

    <div id="toast" class="toast hidden" role="status" aria-live="polite"></div>

    <dialog id="endingDialog" class="ending-dialog">
      <div class="dialog-card">
        <p class="mini-label">隐藏结局已触发</p>
        <h2>今日求生失败</h2>
        <p id="endingMessage">暴走值突破上限，男朋友已申请抱头认错并提交恋爱检讨书。</p>
        <button id="closeDialogButton" class="primary-button" type="button">先放过他</button>
      </div>
    </dialog>

    <script src="./js/app.js"></script>
  </body>
</html>
